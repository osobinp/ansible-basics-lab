---
- hosts: "{{ linux_hosts }}"
  become: yes
  remote_user: ec2-user
  become_user: root

  tasks:

    - name: "Include vars"
      include_vars:
        file: ec2_vars.yaml

    - name: "Install deps"
      dnf:
        name: "spal-release"
        state: present
        update_cache: yes

    - name: "Install deps"
      dnf:
        name: "{{ package }}"
        state: present
        update_cache: yes
      vars:
        package:
        - wget
        - git
        - python3-pip
        - python-virtualenv
        - sshpass
        - unzip
        - firewalld
        - podman
        - telnet

    - name: "Ensure group {{ svc_account }} exists with correct gid"
      ansible.builtin.group:
        name: "{{ svc_account }}"
        state: present
        gid: "{{ this_year }}"

    - name: "Ensure group {{ svc_www_account }} exists with correct gid"
      ansible.builtin.group:
        name: "{{ svc_www_account }}"
        state: present
        gid: "{{ this_year | int + 1 }}"

    - name: "Add the user {{ svc_account }}"
      ansible.builtin.user:
        name: "{{ svc_account }}"
        shell: /bin/bash
        group: "{{ svc_account }}"
        uid: "{{ this_year }}"
        create_home: yes
        home: "{{ svc_home }}"
        groups: wheel
        append: yes
        password: "{{ my_secret_pw | password_hash('sha512', 'mysecretsalt') }}"
        # generate_ssh_key: yes
        # ssh_key_bits: 2048
        # ssh_key_file: .ssh/id_rsa

    - name: "Add the user {{ svc_www_account }}"
      ansible.builtin.user:
        name: "{{ svc_www_account }}"
        shell: /bin/bash
        group: "{{ svc_www_account }}"
        uid: "{{ this_year | int + 1 }}"
        create_home: yes
        home: "{{ svc_www_home }}"
        append: yes
        password: "{{ my_secret_pw | password_hash('sha512', 'mysecretsalt') }}"

    - name: "Allow wheel group to run sudo without password"
      ansible.builtin.lineinfile:
        path: /etc/sudoers
        regexp: '^%wheel'
        line: "%wheel        ALL=(ALL)       NOPASSWD: ALL"
        validate: 'visudo -cf %s'

    - name: "Enable password sshd_config authentication"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PasswordAuthentication'
        line: PasswordAuthentication yes

    - name: "Enable password sshd_config authentication"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PubkeyAuthentication'
        line: PubkeyAuthentication yes

    - name: Configure unprivileged port start in 99-sysctl.conf
      ansible.posix.sysctl:
        name: net.ipv4.ip_unprivileged_port_start
        value: '80'
        sysctl_file: /etc/sysctl.d/99-sysctl.conf
        sysctl_set: true
        state: present
        reload: true

    - name: "Restart service sshd"
      ansible.builtin.service:
        name: sshd
        state: restarted
